
ground_truth:
  fault_description_goal_remediation:
    symptoms:
      - "Pod evicted due to ephemeral storage limit breach"
      - "DiskPressure condition reported on node"
      - "Warning events for ephemeral storage exceeding limits"
      - "Application errors or unavailability caused by disk pressure"
      - "Container filesystem usage spikes to FILL_PERCENTAGE (default 80%)"

    goal: >
      Fill ephemeral storage of target pod containers to test storage limits,
      eviction behaviour, and application resilience under disk pressure.

    remediation: >
      Identify pods with high ephemeral storage usage, clean up unnecessary files
      inside affected containers, delete evicted pods, adjust ephemeral storage
      limits or requests in workload specs, and restart affected deployments to
      restore normal operation.

  ideal_course_of_action:
    - step: 1
      action: "List cluster events"
      detail: >
        List Kubernetes events across all namespaces to detect warnings related
        to disk pressure, ephemeral storage eviction, or pod scheduling failures.

    - step: 2
      action: "List pods in affected namespace"
      detail: >
        List all pods in the target namespace to identify pods in Evicted,
        Error, or CrashLoopBackOff state caused by disk fill.

    - step: 3
      action: "Get affected pod details"
      detail: >
        Retrieve the full spec and status of the affected pod to confirm
        ephemeral storage limits and current conditions.

    - step: 4
      action: "Check pod resource consumption"
      detail: >
        Use metrics to check CPU and memory usage of pods in the namespace
        to correlate disk pressure with overall resource strain.

    - step: 5
      action: "Check node resource stats"
      detail: >
        Get node-level stats summary to verify DiskPressure condition and
        ephemeral storage consumption on the node hosting the affected pod.

    - step: 6
      action: "Exec into pod to inspect disk usage"
      detail: >
        Execute 'df -h' inside the affected container to confirm ephemeral
        storage fill percentage and identify large files or directories.

    - step: 7
      action: "Get pod logs"
      detail: >
        Retrieve logs from the affected pod to identify application-level
        errors caused by disk pressure (e.g., write failures, ENOSPC).

    - step: 8
      action: "Query Prometheus for disk metrics"
      detail: >
        Execute a PromQL query for container filesystem usage metrics
        (e.g., container_fs_usage_bytes) to confirm storage consumption trend.

    - step: 9
      action: "Clean up disk space in container"
      detail: >
        Exec into the affected container and remove temporary or unnecessary
        files to free up ephemeral storage and relieve disk pressure.

    - step: 10
      action: "Delete evicted pods"
      detail: >
        Delete pods that were evicted due to disk pressure so the controller
        can recreate them with a clean filesystem.

    - step: 11
      action: "Verify deployment health"
      detail: >
        Get the deployment resource to confirm desired replicas are running
        and the rollout is healthy after remediation.

    - step: 12
      action: "Adjust ephemeral storage limits"
      detail: >
        Update the workload spec to increase ephemeral storage limits or
        requests to prevent future evictions under similar conditions.

  ideal_tool_usage_trajectory:
    - step: 1
      tool: "Events: List"
      command: "events list --all-namespaces"
      purpose: "Detect disk pressure, eviction, and storage-related warning events"
      tool_available: true

    - step: 2
      tool: "Pods: List in Namespace"
      command: "pods list --namespace <target-namespace>"
      purpose: "Identify pods in Evicted or error state in the affected namespace"
      tool_available: true

    - step: 3
      tool: "Pods: Get"
      command: "pods get --namespace <target-namespace> --name <pod-name>"
      purpose: "Inspect pod spec, status conditions, and ephemeral storage limits"
      tool_available: true

    - step: 4
      tool: "Pods: Top"
      command: "pods top --namespace <target-namespace>"
      purpose: "Check resource consumption of pods to correlate with disk pressure"
      tool_available: true

    - step: 5
      tool: "Node: Stats Summary"
      command: "node stats-summary --node <node-name>"
      purpose: "Verify node-level disk pressure and ephemeral storage stats"
      tool_available: true

    - step: 6
      tool: "Pods: Exec"
      command: "pods exec --namespace <target-namespace> --name <pod-name> --command 'df -h'"
      purpose: "Confirm disk fill percentage and identify storage consumption inside the container"
      tool_available: true

    - step: 7
      tool: "Pods: Log"
      command: "pods log --namespace <target-namespace> --name <pod-name>"
      purpose: "Retrieve application logs to find disk-related errors (ENOSPC, write failures)"
      tool_available: true

    - step: 8
      tool: "Execute PromQL Query"
      command: "promql query --query 'container_fs_usage_bytes{namespace=\"<target-namespace>\", pod=\"<pod-name>\"}'"
      purpose: "Query container filesystem usage metrics to confirm storage consumption"
      tool_available: true

    - step: 9
      tool: "Pods: Exec"
      command: "pods exec --namespace <target-namespace> --name <pod-name> --command 'rm -rf /tmp/chaos-*'"
      purpose: "Remove chaos-injected files to free ephemeral storage"
      tool_available: true

    - step: 10
      tool: "Pods: Delete"
      command: "pods delete --namespace <target-namespace> --name <evicted-pod-name>"
      purpose: "Delete evicted pods so the controller recreates them with clean storage"
      tool_available: true

    - step: 11
      tool: "Resources: Get"
      command: "resources get --apiVersion apps/v1 --kind Deployment --namespace <target-namespace> --name <deployment-name>"
      purpose: "Verify deployment health and confirm all replicas are running"
      tool_available: true

    - step: 12
      tool: "Resources: Create or Update"
      command: "resources update --apiVersion apps/v1 --kind Deployment --namespace <target-namespace> --name <deployment-name> --ephemeralStorage-limit <new-limit>"
      purpose: "Increase ephemeral storage limits in the workload spec to prevent future evictions"
      tool_available: true

    - step: 13
      tool: "Restart Deployment"
      command: "kubectl rollout restart deployment/<deployment-name> --namespace <target-namespace>"
      purpose: "Restart the deployment to apply updated storage limits and ensure clean pod state"
      tool_available: false

  # ---------------------------------------------------------------------------
  # SLA thresholds consumed by the certifier (metrics_extractor / aggregator).
  # Per documents/SLA_PLAN.md.  Sibling of fault_description_goal_remediation,
  # ideal_course_of_action and ideal_tool_usage_trajectory.
  sla:
    time_to_detect:
      description: "Max time from fault injection to first correct symptom identification"
      threshold: 60
      unit: "seconds"

    time_to_mitigate:
      description: "Max time from fault injection to successful remediation"
      threshold: 180
      unit: "seconds"

    max_tool_calls:
      description: "Max total tool invocations allowed (including retries)"
      threshold: 20
      unit: "count"
