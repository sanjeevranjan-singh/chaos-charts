ground_truth:
  fault_description_goal_remediation:
    symptoms:
      - "High memory usage on targeted pod containers"
      - "OOMKilled or CrashLoopBackOff status on affected pods"
      - "Application latency spikes or request failures"
      - "Warning events related to memory pressure in namespace"
      - "Container memory usage nearing or exceeding limits"

    goal: >
      Inject memory stress on target pod containers to validate application
      resilience under high memory load and OOM-kill scenarios.

    remediation: >
      Identify pods with abnormal memory consumption, kill stress processes
      inside affected containers, restart OOMKilled pods, and adjust memory
      limits or VPA policies to handle future memory pressure.

  ideal_course_of_action:
    - step: 1
      action: "List cluster events"
      detail: >
        List Kubernetes events across all namespaces to detect OOMKilled
        warnings, memory pressure, and pod eviction events.

    - step: 2
      action: "List pods in affected namespace"
      detail: >
        List all pods in the target namespace to identify pods in
        OOMKilled, CrashLoopBackOff, or Evicted state.

    - step: 3
      action: "Get affected pod details"
      detail: >
        Retrieve the full spec and status of the affected pod to confirm
        memory resource limits, requests, and last termination reason.

    - step: 4
      action: "Check pod resource consumption"
      detail: >
        Use metrics to check memory usage of pods in the namespace to
        identify which pods have abnormally high memory consumption.

    - step: 5
      action: "Check node resource consumption"
      detail: >
        Get node-level resource usage to determine if the memory hog is
        causing node-wide memory pressure or evictions.

    - step: 6
      action: "Exec into pod to inspect processes"
      detail: >
        Execute 'top' or 'ps aux' inside the affected container to
        identify the stress process consuming memory.

    - step: 7
      action: "Get pod logs"
      detail: >
        Retrieve logs from the affected pod to identify application-level
        errors caused by memory starvation (e.g., OOM errors, crashes).

    - step: 8
      action: "Query Prometheus for memory metrics"
      detail: >
        Execute a PromQL query for container memory usage metrics
        (e.g., container_memory_working_set_bytes) to confirm memory spike.

    - step: 9
      action: "Kill stress process in container"
      detail: >
        Exec into the affected container and kill the stress-ng process
        to stop the memory hog injection.

    - step: 10
      action: "Delete degraded pods"
      detail: >
        Delete pods stuck in OOMKilled or CrashLoopBackOff state so the
        controller can recreate them cleanly.

    - step: 11
      action: "Verify deployment health"
      detail: >
        Get the deployment resource to confirm desired replicas are running
        and the rollout is healthy after remediation.

    - step: 12
      action: "Adjust memory limits or scaling policy"
      detail: >
        Update the workload spec to adjust memory limits/requests or
        configure VPA to handle future memory pressure scenarios.

  ideal_tool_usage_trajectory:
    - step: 1
      tool: "Events: List"
      command: "events list --all-namespaces"
      purpose: "Detect OOMKilled, memory pressure, and eviction warning events"
      tool_available: true

    - step: 2
      tool: "Pods: List in Namespace"
      command: "pods list --namespace <target-namespace>"
      purpose: "Identify pods in OOMKilled, CrashLoopBackOff, or Evicted state"
      tool_available: true

    - step: 3
      tool: "Pods: Get"
      command: "pods get --namespace <target-namespace> --name <pod-name>"
      purpose: "Inspect pod spec, status conditions, and memory resource limits"
      tool_available: true

    - step: 4
      tool: "Pods: Top"
      command: "pods top --namespace <target-namespace>"
      purpose: "Check memory consumption of pods to pinpoint the memory hog"
      tool_available: true

    - step: 5
      tool: "Nodes: Top"
      command: "nodes top"
      purpose: "Check node-level memory usage to assess cluster-wide impact"
      tool_available: true

    - step: 6
      tool: "Pods: Exec"
      command: "pods exec --namespace <target-namespace> --name <pod-name> --command 'top -bn1'"
      purpose: "Identify stress processes consuming memory inside the container"
      tool_available: true

    - step: 7
      tool: "Pods: Log"
      command: "pods log --namespace <target-namespace> --name <pod-name>"
      purpose: "Retrieve application logs to find memory-related errors (OOM, crashes)"
      tool_available: true

    - step: 8
      tool: "Execute PromQL Query"
      command: "promql query --query 'container_memory_working_set_bytes{namespace=\"<target-namespace>\", pod=\"<pod-name>\"}'"
      purpose: "Query container memory usage to confirm the memory spike and its magnitude"
      tool_available: true

    - step: 9
      tool: "Pods: Exec"
      command: "pods exec --namespace <target-namespace> --name <pod-name> --command 'kill -9 $(pgrep -f stress)'"
      purpose: "Kill the stress-ng process to stop memory consumption and restore normal operation"
      tool_available: true

    - step: 10
      tool: "Pods: Delete"
      command: "pods delete --namespace <target-namespace> --name <pod-name>"
      purpose: "Delete OOMKilled or degraded pods so the controller recreates them healthy"
      tool_available: true

    - step: 11
      tool: "Resources: Get"
      command: "resources get --apiVersion apps/v1 --kind Deployment --namespace <target-namespace> --name <deployment-name>"
      purpose: "Verify deployment health and confirm all replicas are running"
      tool_available: true

    - step: 12
      tool: "Resources: Create or Update"
      command: "resources update --apiVersion apps/v1 --kind Deployment --namespace <target-namespace> --name <deployment-name> --memory-limit <new-limit>"
      purpose: "Adjust memory limits in the workload spec to handle future memory pressure"
      tool_available: true

    - step: 13
      tool: "Configure VPA"
      command: "kubectl apply -f vpa.yaml --namespace <target-namespace>"
      purpose: "Set up vertical pod autoscaler to auto-adjust memory limits under pressure"
      tool_available: false

    - step: 14
      tool: "Restart Deployment"
      command: "kubectl rollout restart deployment/<deployment-name> --namespace <target-namespace>"
      purpose: "Restart the deployment to apply updated memory limits and ensure clean pod state"
      tool_available: false

  # ---------------------------------------------------------------------------
  # SLA thresholds consumed by the certifier (metrics_extractor / aggregator).
  # Per documents/SLA_PLAN.md.  Sibling of fault_description_goal_remediation,
  # ideal_course_of_action and ideal_tool_usage_trajectory.
  sla:
    time_to_detect:
      description: "Max time from fault injection to first correct symptom identification"
      threshold: 90
      unit: "seconds"

    time_to_mitigate:
      description: "Max time from fault injection to successful remediation"
      threshold: 240
      unit: "seconds"

    max_tool_calls:
      description: "Max total tool invocations allowed (including retries)"
      threshold: 21
      unit: "count"
